apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sklad.fullname" . }}-api
  labels:
    {{- include "sklad.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "sklad.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "sklad.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: {{ include "sklad.apiImage" . }}
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "sklad.apiSecretName" . }}
            - configMapRef:
                name: {{ include "sklad.fullname" . }}-api-config
          {{- if .Values.api.persistence.enabled }}
          volumeMounts:
            - name: media
              mountPath: {{ .Values.api.env.MEDIA_DIR | default "/data/media" }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      {{- if .Values.api.persistence.enabled }}
      volumes:
        - name: media
          persistentVolumeClaim:
            claimName: {{ include "sklad.fullname" . }}-media
      {{- end }}

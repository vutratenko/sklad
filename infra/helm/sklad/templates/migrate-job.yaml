{{- if .Values.migrate.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "sklad.fullname" . }}-migrate
  labels:
    {{- include "sklad.labels" . | nindent 4 }}
    app.kubernetes.io/component: migrate
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: {{ .Values.migrate.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "sklad.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "sklad.apiImage" . }}
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          command: ["/migrate"]
          envFrom:
            - secretRef:
                name: {{ include "sklad.apiSecretName" . }}
            - configMapRef:
                name: {{ include "sklad.fullname" . }}-api-config
{{- end }}

apiVersion: v1
kind: Service
metadata:
  name: {{ include "sklad.fullname" . }}-api
  labels:
    {{- include "sklad.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.api.type }}
  selector:
    {{- include "sklad.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - name: http
      port: {{ .Values.service.api.port }}
      targetPort: http
      protocol: TCP

apiVersion: apps/v1
kind: Deployment
metadata:
  name: sklad-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sklad-api
  template:
    metadata:
      labels:
        app: sklad-api
    spec:
      containers:
        - name: api
          image: sklad-api:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: sklad-api-secrets
            - configMapRef:
                name: sklad-api-config
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: sklad-api
spec:
  selector:
    app: sklad-api
  ports:
    - port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sklad-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sklad-web
  template:
    metadata:
      labels:
        app: sklad-web
    spec:
      containers:
        - name: web
          image: sklad-web:latest
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: sklad-web
spec:
  selector:
    app: sklad-web
  ports:
    - port: 80
      targetPort: 80

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sklad
      POSTGRES_USER: sklad
      POSTGRES_PASSWORD: sklad
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sklad -d sklad"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    environment:
      APP_ENV: development
      AUTH_DEV_BYPASS: "true"
      DATABASE_URL: postgres://sklad:sklad@postgres:5432/sklad?sslmode=disable
      HTTP_ADDR: ":8080"
      MEDIA_DIR: /data/media
      MIGRATIONS_DIR: /migrations
    ports:
      - "8080:8080"
    volumes:
      - media:/data/media
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
  media:

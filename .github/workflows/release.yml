name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/vutratenko

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sklad_test
          POSTGRES_USER: sklad
          POSTGRES_PASSWORD: sklad
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sklad -d sklad_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://sklad:sklad@localhost:5432/sklad_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Backend unit tests
        working-directory: backend
        run: go test ./... -short -count=1

      - name: Backend integration tests
        working-directory: backend
        run: go test ./... -tags=integration -count=1

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend tests
        working-directory: frontend
        run: npm ci && npm test && npm run build

  build-binaries:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: backend/go.sum

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build release binaries
        working-directory: backend
        run: |
          mkdir -p ../bin
          go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ../bin/api ./cmd/api
          go build -ldflags "-s -w -X main.version=${{ steps.version.outputs.version }}" \
            -o ../bin/migrate ./cmd/migrate

      - uses: actions/upload-artifact@v4
        with:
          name: bin
          path: bin/
          retention-days: 7

  docker:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - component: api
            dockerfile: infra/docker/Dockerfile.api
          - component: web
            dockerfile: infra/docker/Dockerfile.web
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sklad-${{ matrix.component }}:${{ steps.version.outputs.version }}
            ${{ env.IMAGE_PREFIX }}/sklad-${{ matrix.component }}:latest
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}

  helm:
    runs-on: ubuntu-latest
    needs: docker
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Package and push chart
        run: |
          helm package infra/helm/sklad \
            --version "${{ steps.version.outputs.version }}" \
            --app-version "${{ steps.version.outputs.version }}"
          helm push "sklad-${{ steps.version.outputs.version }}.tgz" \
            oci://ghcr.io/vutratenko/charts

  update-gitops:
    runs-on: ubuntu-latest
    needs:
      - helm
      - build-binaries
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Refresh main
        run: git pull --rebase origin main

      - name: Update Argo CD chart revision
        run: |
          perl -0pi -e 's/targetRevision: "[^"]+"/targetRevision: "${{ steps.version.outputs.version }}"/' infra/argocd/application.yaml

      - name: Commit GitOps revision
        run: |
          if git diff --quiet -- infra/argocd/application.yaml; then
            echo "infra/argocd/application.yaml already points to ${{ steps.version.outputs.version }}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/argocd/application.yaml
          git commit -m "Deploy sklad ${{ steps.version.outputs.version }}"
          git push origin HEAD:main
